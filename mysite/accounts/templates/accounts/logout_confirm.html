{% extends 'portfolio/base.html' %}

<p>Tens a certeza que queres sair, <strong>{{ request.user.username }}</strong>?</p>

<form method="post">

    <a href="{% url 'portfolio:index' %}">Cancelar</a>
</form>
{% endblock %}
